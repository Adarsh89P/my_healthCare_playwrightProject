name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  smoke-tests:
    name: Smoke Test Execution (${{ matrix.app }})
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [healthcare]
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test --grep @smoke
      env:
        APP: ${{ matrix.app }}
    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results-${{ matrix.app }}
        path: allure-results/
        retention-days: 30


  regression-tests:
    name: Regression Test Execution (${{ matrix.app }})
    needs: smoke-tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        app: [healthcare]
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Install Dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Regression Tests
      run: npx playwright test --grep @regression
      env:
        APP: ${{ matrix.app }}
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: regression-playwright-report-${{ matrix.app }}
        path: playwright-report/
        retention-days: 30
    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: regression-allure-results-${{ matrix.app }}
        path: allure-results/
        retention-days: 30